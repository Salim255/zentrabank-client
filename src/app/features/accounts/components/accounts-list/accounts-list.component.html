<section class="accounts-list">

  <!-- Header -->
  <header class="accounts-list__header">
    <h1 class="accounts-list__title">Your Accounts</h1>
    <p class="accounts-list__subtitle">
      A complete overview of your financial accounts.
    </p>
  </header>

  <!-- Accounts List -->
  <div class="accounts-list__rows">
    @for (item of accounts(); track $index) {
      <app-account-item [account]="item" ></app-account-item>
    }
  </div>

</section>
