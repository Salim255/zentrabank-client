<section class="account-details">

  <h2 class="account-details__title">Bank Account Details</h2>

  <!-- Account Holder -->
  <div class="account-details__row">
    <span class="account-details__label">Account Holder</span>
    <span class="account-details__value">John Doe</span>
  </div>

  <!-- Account Number -->
  <div class="account-details__row">
    <span class="account-details__label">Account Number</span>
    <span class="account-details__value">234567000</span>
  </div>

  <!-- IBAN -->
  <div class="account-details__row">
    <span class="account-details__label">IBAN</span>
    <span class="account-details__value">FR76 3000 6000 0112 3456 7890 189</span>
  </div>

  <!-- BIC / SWIFT -->
  <div class="account-details__row">
    <span class="account-details__label">BIC / SWIFT</span>
    <span class="account-details__value">BNPAFRPPXXX</span>
  </div>

  <!-- Account Type -->
  <div class="account-details__row">
    <span class="account-details__label">Account Type</span>
    <span class="account-details__value">Current Account</span>
  </div>

  <!-- Available Balance -->
  <div class="account-details__row">
    <span class="account-details__label">Available Balance</span>
    <span class="account-details__value account-details__value--highlight">
      €12,450.90
    </span>
  </div>

  <!-- Actions -->
  <div class="account-details__actions">
    <button class="account-details__button">View Transactions</button>
    <button class="account-details__button account-details__button--secondary">
      Download Statement
    </button>
  </div>

</section>
