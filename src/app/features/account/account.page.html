<app-account-header></app-account-header>
<section class="accounts-page">

  <!-- Page Title -->
  <h1 class="accounts-page__title">Your Accounts</h1>

  <!-- Accounts List -->
  <div class="accounts-page__list">

    <!-- Account Card -->
    <div class="accounts-page__card">
      <div class="accounts-page__header">
        <h2 class="accounts-page__account-name">Main Current Account</h2>
        <span class="accounts-page__badge accounts-page__badge--current">Current</span>
      </div>

      <div class="accounts-page__row">
        <span class="accounts-page__label">Account Number</span>
        <span class="accounts-page__value">234567000</span>
      </div>

      <div class="accounts-page__row">
        <span class="accounts-page__label">IBAN</span>
        <span class="accounts-page__value">FR76 3000 6000 0112 3456 7890 189</span>
      </div>

      <div class="accounts-page__row">
        <span class="accounts-page__label">Available Balance</span>
        <span class="accounts-page__value accounts-page__value--highlight">€12,450.90</span>
      </div>

      <div class="accounts-page__actions">
        <button class="accounts-page__button">View Details</button>
        <button class="accounts-page__button accounts-page__button--secondary">Manage</button>
      </div>
    </div>

    <!-- Another Account -->
    <div class="accounts-page__card">
      <div class="accounts-page__header">
        <h2 class="accounts-page__account-name">Savings Account</h2>
        <span class="accounts-page__badge accounts-page__badge--savings">Savings</span>
      </div>

      <div class="accounts-page__row">
        <span class="accounts-page__label">Account Number</span>
        <span class="accounts-page__value">987654321</span>
      </div>

      <div class="accounts-page__row">
        <span class="accounts-page__label">IBAN</span>
        <span class="accounts-page__value">FR76 3000 6000 0112 9876 5432 100</span>
      </div>

      <div class="accounts-page__row">
        <span class="accounts-page__label">Available Balance</span>
        <span class="accounts-page__value accounts-page__value--highlight">€5,200.00</span>
      </div>

      <div class="accounts-page__actions">
        <button class="accounts-page__button">View Details</button>
        <button class="accounts-page__button accounts-page__button--secondary">Manage</button>
      </div>
    </div>

  </div>

</section>
