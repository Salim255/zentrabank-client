<form
  [formGroup]="signupForm"
  (ngSubmit)="onSubmit()"
  class="signup-form">

  <h2 class="signup-form__title">Create a Username and Password</h2>

  <!-- Email -->
  <div class="form-group">
    <label for="email">Email Address</label>
    <input
      id="email"
      type="email"
      formControlName="email"
      class="form-input" />
    <app-form-error
        [control]="signupForm.get('email')"
        field="email">
    </app-form-error>
  </div>

  <!-- Username -->
  <div class="form-group">
    <label for="username">Username</label>
    <input
      id="username"
      type="text"
      formControlName="username"
      class="form-input" />

    <app-form-error
          [control]="signupForm.get('username')"
          field="username">
    </app-form-error>
  </div>

  <!-- Password -->
  <div class="form-group">
    <label for="password">Password</label>

    <div class="password-wrapper">
      <input
        id="password"
        type="{{ showPassword() ? 'text' : 'password' }}"
        formControlName="password"
        class="form-input" />

      <button
        type="button"
        class="show-btn"
        (click)="showPassword.set(!showPassword())">
        {{ showPassword() ? 'Hide' : 'Show' }}
      </button>
    </div>

    <app-form-error
      [control]="signupForm.get('password')"
      field="password">
    </app-form-error>
  </div>

  <!-- Confirm Password -->
  <div class="form-group">
    <label for="confirmPassword">Confirm Password</label>
    <input
      id="confirmPassword"
      type="password"
      formControlName="confirmPassword"
      class="form-input" />
    <app-form-error
      [control]="signupForm.get('confirmPassword')"
      field="confirmPassword">
    </app-form-error>
  </div>

  <!-- Country -->
  <div class="form-group">
    <label for="country">Country</label>
    <select
      id="country"
      formControlName="country"
      class="form-select">
      <option value="">Select a country</option>
      <option value="fr">
        france
      </option>
    </select>
  </div>

  <!-- Marketing Preferences -->
  <div class="form-group">
    <label class="form-label">Marketing Preferences</label>
    <p class="form-description">
      Do you want to be contacted by ZentraBank about features, products and offers?
    </p>

    <div class="radio-group">
      <label>
        <input type="radio" formControlName="marketing" value="yes" />
        Yes
      </label>

      <label>
        <input type="radio" formControlName="marketing" value="no" />
        No
      </label>
    </div>
  </div>

  <!-- Submit -->
  <button type="submit" class="submit-btn">
    Create Account
  </button>
</form>
