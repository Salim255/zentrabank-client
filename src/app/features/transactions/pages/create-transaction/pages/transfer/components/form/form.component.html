<form class="transaction-form">

  <h2 class="transaction-form__title">Transfer Details</h2>

  <!-- Description -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Description</label>
    <input
      type="text"
      name="description"
      class="transaction-form__input"
      placeholder="Enter description"
    />
  </div>

  <!-- Amount -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Amount</label>
    <input
      type="number"
      name="amount"
      step="0.01"
      class="transaction-form__input"
      placeholder="0.00"
    />
  </div>

  <!-- Type -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Transaction Type</label>
    <select name="type" class="transaction-form__select">
      <option value="TRANSFER">Transfer</option>
      <option value="DEPOSIT">Deposit</option>
      <option value="WITHDRAW">Withdraw</option>
    </select>
  </div>

  <!-- Reference Account -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Reference Account Number</label>
    <input
      type="text"
      name="referenceAccountNumber"
      class="transaction-form__input"
      placeholder="Enter account number"
    />
  </div>

  <!-- Submit -->
  <button type="submit" class="transaction-form__button">
    Submit Transfer
  </button>

</form>
