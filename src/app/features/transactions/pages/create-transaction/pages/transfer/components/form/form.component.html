<form class="transaction-form">

  <h2 class="transaction-form__title">Transfer Details</h2>

  <!-- Receiver Name -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Recipient Name</label>
    <input
      type="text"
      name="recipientName"
      class="transaction-form__input"
      placeholder="Enter recipient full name"
    />
  </div>

  <!-- Recipient IBAN -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Recipient IBAN</label>
    <input
      type="text"
      name="iban"
      class="transaction-form__input"
      placeholder="Enter recipient IBAN"
    />
  </div>

  <!-- Recipient BIC -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Recipient BIC (SWIFT)</label>
    <input
      type="text"
      name="bic"
      class="transaction-form__input"
      placeholder="Enter recipient BIC"
    />
  </div>

  <!-- Transfer Amount -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Transfer Amount (€)</label>
    <input
      type="number"
      name="amount"
      step="0.01"
      class="transaction-form__input"
      placeholder="0.00"
    />
  </div>

  <!-- Transaction Type -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Transaction Type</label>
    <select name="type" class="transaction-form__select">
      <option value="TRANSFER">Transfer</option>
      <option value="DEPOSIT">Deposit</option>
      <option value="WITHDRAW">Withdraw</option>
    </select>
  </div>

  <!-- Optional: Receiver Account Number -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Receiver Account Number</label>
    <input
      type="text"
      name="referenceAccountNumber"
      class="transaction-form__input"
      placeholder="Enter receiver account number"
    />
  </div>

  <!-- Submit -->
  <button type="submit" class="transaction-form__button">
    Submit Transfer
  </button>

</form>
