<form class="transaction-form" [formGroup]="transForm">

  <h2 class="transaction-form__title">Transfer Details</h2>



  <!-- Recipient IBAN -->
  <div class="transaction-form__group">
    <label for="iban" class="transaction-form__label">Recipient IBAN</label>
    <input
      type="text"
      name="iban"
      formControlName="iban"
      class="transaction-form__input"
      placeholder="Enter recipient IBAN"
    />
    <app-form-error
          [control]="transForm.get('iban')"
          field="iban">
    </app-form-error>
  </div>

  <!-- Recipient BIC -->
  <div class="transaction-form__group">
    <label for="bic" class="transaction-form__label">Recipient BIC (SWIFT)</label>
    <input
      type="text"
      name="bic"
      formControlName="bic"
      class="transaction-form__input"
      placeholder="Enter recipient BIC"
    />
     <app-form-error
        [control]="transForm.get('bic')"
        field="bic">
    </app-form-error>
  </div>

   <!-- Receiver Name -->
  <div class="transaction-form__group">
    <label for="recipientName" class="transaction-form__label">Recipient Name</label>
    <input
      type="text"
      name="recipientName"
      formControlName="recipientName"
      class="transaction-form__input"
      placeholder="Enter recipient full name"
    />
     <app-form-error
        [control]="transForm.get('recipientName')"
        field="recipientName">
    </app-form-error>
  </div>

  <!-- Transfer Amount -->
  <div class="transaction-form__group">
    <label for="amount" class="transaction-form__label">Transfer Amount (€)</label>
    <input
      type="text"
      formControlName="amount"
      class="transaction-form__input"
      placeholder="0.00"
      (input)="formatAmount($event)"
      (blur)="finalizeAmount($event)"
      (keydown)="blockInvalidKeys($event)"
      (paste)="blockInvalidPaste($event)"
    />
    <app-form-error
      [control]="transForm.get('amount')"
      field="amount">
    </app-form-error>
  </div>

  <!-- Transaction Type -->
  <div class="transaction-form__group">
    <label for="type" class="transaction-form__label">Transaction Type</label>
    <select name="type" formControlName="type" class="transaction-form__select">
      <option value="TRANSFER">Transfer</option>
    </select>
  </div>

  <!-- Optional: Receiver Account Number -->
<div class="transaction-form__group">
  <label for="referenceAccountNumber" class="transaction-form__label">
    Debit Account
  </label>

  <select
    name="fromAccountNumber"
    formControlName="fromAccountNumber"
    class="transaction-form__input transaction-form__select"
  >
    <option value="" disabled>Select an account</option>

    @for (acc of userAccounts(); track $index) {
      <option
        [value]="acc.accountNumber"
      >
        {{ acc.accountNumber }} — {{ acc.balance | currency:'EUR' }}
      </option>
    }

  </select>

  <app-form-error
    [control]="transForm.get('fromAccountNumber')"
    field="fromAccountNumber">
  </app-form-error>
</div>

  <!-- Submit -->
  <button
    (click)="onTransfer()"
    type="btn"
    class="transaction-form__button">
    Transfer
  </button>

</form>
