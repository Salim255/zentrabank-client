<form class="transaction-form">

  <h2 class="transaction-form__title">Transfer Details</h2>

  <!-- Recipient Email / Description -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Description</label>
    <input
      type="text"
      name="description"
      class="transaction-form__input"
      placeholder="Enter description"
    />
  </div>

  <!-- Transfer Amount -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Transfer Amount (€)</label>
    <input
      type="number"
      name="amount"
      step="0.01"
      class="transaction-form__input"
      placeholder="0.00"
    />
  </div>

  <!-- Receiver Account Number -->
  <div class="transaction-form__group">
    <label class="transaction-form__label">Receiver Account Number</label>
    <input
      type="text"
      name="referenceAccountNumber"
      class="transaction-form__input"
      placeholder="Enter receiver account number"
    />
  </div>

  <!-- Submit -->
  <button type="submit" class="transaction-form__button">
    Submit Transfer
  </button>

</form>
