<section class="transactions-history">

  <!-- Page Title -->
  <h1 class="transactions-history__title">Transactions History</h1>

  <app-history-filter></app-history-filter>

  <!-- Table -->
  <div class="transactions-history__table">
    <app-history-header></app-history-header>
    <!-- Rows -->
    @for (item of transactions(); track $index) {
      <app-history-item [transaction]="item"></app-history-item>
    }
  </div>
</section>
