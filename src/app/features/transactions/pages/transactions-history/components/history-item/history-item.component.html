 <div class="history-item">
    <span>12 Apr 2026</span>
    <span class="history-item__badge"> {{transformTransferText()}}</span>
    <span class="history-item__name">{{ transaction()?.toClientName }}</span>

      {{ transaction()?.amount | currency:'EUR':'symbol':'1.2-2' }} €
    </span>
  </div>
