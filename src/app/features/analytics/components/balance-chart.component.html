<div class="chart-page">

  <!-- LEFT: scrollable chart -->
  <div class="chart-container">
    <canvas #chart width="1200" height="300"></canvas>
  </div>

  <!-- RIGHT: fixed scale -->
  <div class="chart-scale">
    <div *ngFor="let v of scaleValues" class="scale-value">
      {{ v }} 1
    </div>
  </div>

</div>
