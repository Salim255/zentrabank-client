<div class="balance-chart">

  <!-- LEFT: scrollable chart -->
  <div class="balance-chart__canvas-wrapper">
    <canvas #chart width="1400" height="360"></canvas>
  </div>

  <!-- RIGHT: fixed scale -->
  <div class="balance-chart__scale">
    <div *ngFor="let v of scaleValues" class="balance-chart__scale-value">
      {{ v }}
    </div>
  </div>

</div>
